resourceType: Mapping
id: medication-request-create
type: FHIRPath
body:
  "{% assign %}":
    - patientId: "{{ %QuestionnaireResponse.answers('patientId') }}"
    - patientName: "{{ %QuestionnaireResponse.answers('patientName') }}"
    - requester: "{{ %QuestionnaireResponse.answers('requester') }}"
    - medication: "{{ %QuestionnaireResponse.answers('medication') }}"
    - reason: "{{ %QuestionnaireResponse.answers('reason') }}"
    - dosage: "{{ %QuestionnaireResponse.answers('dosage') }}"
    - status: "{{ %QuestionnaireResponse.answers('status').code }}"
    - intent: "{{ %QuestionnaireResponse.answers('intent').code }}"
    - authoredOn: "{{ %QuestionnaireResponse.answers('authored-on') }}"

  resourceType: Bundle
  type: transaction
  entry:
    - request:
        method: POST
        url: /MedicationRequest
      resource:
        resourceType: MedicationRequest
        meta:
          profile:
            - http://hl7.org.au/fhir/core/StructureDefinition/au-core-medicationrequest
        status: "{{ %status }}"
        intent: "{{ %intent }}"
        medicationCodeableConcept:
          text: "{{ %medication }}"
        subject:
          reference: "Patient/{{ %patientId }}"
          display: "{{ %patientName }}"
        authoredOn: "{{ %authoredOn }}"
        requester: "{{ %requester }}"
        reasonCode:
          - text: "{{ %reason }}"
        dosageInstruction:
          - text: "{{ %dosage }}"
