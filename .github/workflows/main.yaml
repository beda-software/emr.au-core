name: Build and upload static files to the remote server
on:
  push:
    branches:
      - main
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - name: Prepare config
        run: cp contrib/emr-config/config.production.js contrib/emr-config/config.js
      - name: Prepare index.html
        run: cp public/index.production.html index.html
      - name: Install deps
        run: yarn install --frozen-lockfile
      - run: yarn extract
      - run: yarn compile
      - run: yarn build
      - name: Build resources bundle
        run: docker compose run --rm build-resources
      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundle
          path: bundles/bundle.json
      - name: copy file via ssh
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY}}
          source: build
          target: emr-au-core-static
  upload-bundle:
    name: Upload bundle
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        fhir_server:
          - https://aucore.aidbox.beda.software
          - https://smartonfhir.aidbox.beda.software
    steps:
      - name: Download bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: bundle
      - name: Upload bundle to FHIR server
        run: |
          curl --fail-with-body -X POST \
            -u "${{ secrets.BASIC_AUTH }}" \
            -H "Content-Type: application/fhir+json" \
            -d @bundle.json \
            ${{ matrix.fhir_server }}/fhir
